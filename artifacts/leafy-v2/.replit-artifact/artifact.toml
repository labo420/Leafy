kind = "web"
previewPath = "/leafy-v2/"
title = "Leafy v2"
version = "1.0.0"
id = "artifacts/leafy-v2"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 20040
name = "web"
paths = ["/leafy-v2/"]

[services.development]
run = "pnpm --filter @workspace/leafy-v2 run dev"

[services.env]
PORT = "20040"
BASE_PATH = "/leafy-v2/"

[services.production]
build = ["pnpm", "--filter", "@workspace/leafy-v2", "run", "build"]
publicDir = "artifacts/leafy-v2/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
