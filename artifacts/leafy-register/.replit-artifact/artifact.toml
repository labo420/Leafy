kind = "web"
previewPath = "/"
title = "Leafy"
version = "1.0.0"
id = "artifacts/leafy-register"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 18794
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/leafy-register run dev"

[services.env]
PORT = "18794"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/leafy-register", "run", "build"]
publicDir = "artifacts/leafy-register/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
