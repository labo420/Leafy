kind = "web"
previewPath = "/"
title = "Leafy"
version = "1.0.0"
id = "artifacts/leafy"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 24389
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/leafy run dev"

[services.env]
PORT = "24389"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/leafy", "run", "build"]
publicDir = "artifacts/leafy/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
