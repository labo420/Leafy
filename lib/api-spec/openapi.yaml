openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: Leafy - Piattaforma Loyalty & Sostenibilità API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: profile
    description: User profile and stats
  - name: scan
    description: Receipt scanning and points
  - name: receipts
    description: Receipt history
  - name: vouchers
    description: Marketplace vouchers
  - name: badges
    description: Badge collection system
  - name: challenges
    description: Monthly challenges
  - name: leaderboard
    description: Weekly leaderboard
  - name: products
    description: Green product catalog
  - name: Auth
    description: Browser authentication endpoints.
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /profile:
    get:
      operationId: getProfile
      tags: [profile]
      summary: Get current user profile
      responses:
        "200":
          description: User profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Profile"

  /profile/impact:
    get:
      operationId: getImpact
      tags: [profile]
      summary: Get user environmental impact stats
      responses:
        "200":
          description: Impact stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ImpactStats"

  /profile/referral:
    get:
      operationId: getReferral
      tags: [profile]
      summary: Get user referral code and info
      responses:
        "200":
          description: Referral info
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReferralInfo"

  /profile/referral/apply:
    post:
      operationId: applyReferral
      tags: [profile]
      summary: Apply a referral code
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ApplyReferralBody"
      responses:
        "200":
          description: Referral applied
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApplyReferralResponse"
        "400":
          description: Invalid or already used code
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /scan:
    post:
      operationId: scanReceipt
      tags: [scan]
      summary: Validate receipt as proof of purchase (no points awarded)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ScanReceiptBody"
      responses:
        "200":
          description: Receipt validated, barcode session started
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ScanResult"
        "400":
          description: Duplicate receipt or validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /scan/barcode/lookup:
    post:
      operationId: barcodeLookup
      tags: [scan]
      summary: Look up product by barcode (preview, no points credited)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BarcodeScanBody"
      responses:
        "200":
          description: Product preview with points to award
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BarcodeLookupResult"
        "404":
          description: Product not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /scan/barcode/preview:
    post:
      operationId: barcodePreview
      tags: [scan]
      summary: Standalone barcode lookup for Shopping Mode (estimate only, no points credited)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BarcodePreviewBody"
      responses:
        "200":
          description: Product preview with estimated points
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BarcodePreviewResult"
        "404":
          description: Product not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /scan/barcode/confirm:
    post:
      operationId: barcodeConfirm
      tags: [scan]
      summary: Confirm barcode scan and credit points
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BarcodeScanBody"
      responses:
        "200":
          description: Points credited successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BarcodeConfirmResult"
        "400":
          description: Session expired or duplicate barcode
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /scan/active-session:
    get:
      operationId: getActiveSession
      tags: [scan]
      summary: Get active barcode scanning session
      responses:
        "200":
          description: Active session data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ActiveSession"

  /receipts:
    get:
      operationId: getReceipts
      tags: [receipts]
      summary: Get receipt scan history
      responses:
        "200":
          description: List of receipts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Receipt"

  /receipts/{id}:
    get:
      operationId: getReceipt
      tags: [receipts]
      summary: Get a single receipt
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Receipt detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReceiptDetail"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /receipts/{id}/image:
    get:
      operationId: getReceiptImage
      tags: [receipts]
      summary: Get receipt photo (auth-protected, 30-day retention)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Receipt image
          content:
            image/jpeg:
              schema:
                type: string
                format: binary
        "404":
          description: Image not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "410":
          description: Image expired
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /accepted-stores:
    get:
      operationId: getAcceptedStores
      tags: [scan]
      summary: Get list of accepted Italian supermarket chains
      responses:
        "200":
          description: Accepted stores by category
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AcceptedStores"

  /marketplace/vouchers:
    get:
      operationId: getVouchers
      tags: [vouchers]
      summary: Get marketplace vouchers
      parameters:
        - name: category
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: List of vouchers
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Voucher"

  /marketplace/vouchers/{id}/redeem:
    post:
      operationId: redeemVoucher
      tags: [vouchers]
      summary: Redeem a voucher with points
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Redemption result with code
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RedemptionResult"
        "400":
          description: Insufficient points or already redeemed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /marketplace/redemptions:
    get:
      operationId: getRedemptions
      tags: [vouchers]
      summary: Get user redemption history
      responses:
        "200":
          description: List of redemptions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Redemption"

  /badges/my:
    get:
      operationId: getMyBadges
      tags: [badges]
      summary: Get current user badges (lifetime + temporal)
      responses:
        "200":
          description: User badges grouped by type
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MyBadgesResponse"

  /challenges:
    get:
      operationId: getChallenges
      tags: [challenges]
      summary: Get active challenges with user progress
      responses:
        "200":
          description: List of challenges
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Challenge"

  /leaderboard:
    get:
      operationId: getLeaderboard
      tags: [leaderboard]
      summary: Get weekly leaderboard
      parameters:
        - name: type
          in: query
          required: false
          schema:
            type: string
            enum: [points, impact]
            default: points
      responses:
        "200":
          description: Leaderboard entries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/LeaderboardEntry"

  /products:
    get:
      operationId: getProducts
      tags: [products]
      summary: Get green product catalog
      parameters:
        - name: category
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: List of green products
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/GreenProduct"

  /auth/user:
    get:
      tags: [Auth]
      operationId: getCurrentAuthUser
      summary: Get the currently authenticated user
      responses:
        "200":
          description: Auth status resolved successfully.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthUserEnvelope"

  /login:
    get:
      tags: [Auth]
      operationId: beginBrowserLogin
      summary: Start the browser OIDC login flow
      parameters:
        - name: returnTo
          in: query
          required: false
          schema:
            type: string
      responses:
        "302":
          description: Redirect to the OIDC authorization endpoint.

  /callback:
    get:
      tags: [Auth]
      operationId: handleBrowserLoginCallback
      summary: Complete the browser OIDC login flow
      responses:
        "302":
          description: Redirect on success or failure.

  /logout:
    get:
      tags: [Auth]
      operationId: logoutBrowserSession
      summary: Clear the session and begin OIDC logout
      responses:
        "302":
          description: Redirect to the OIDC provider logout URL.

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error

    Profile:
      type: object
      properties:
        id:
          type: integer
        username:
          type: string
        email:
          type: string
        totalPoints:
          type: integer
        drops:
          type: integer
          description: Drops (used for leveling)
        leaBalance:
          type: number
          format: double
          description: $LEA cashback balance in EUR
        leaToEur:
          type: number
          format: double
          description: EUR equivalent of leaBalance (1:1 ratio)
        level:
          type: string
          enum: [Germoglio, Ramoscello, Arbusto, Albero, Foresta, Giungla]
        levelProgress:
          type: integer
          description: Progress percentage to next level (0-100)
        nextLevelPoints:
          type: integer
        streak:
          type: integer
          description: Current daily streak in days
        badgesCount:
          type: integer
        badges:
          type: array
          items:
            $ref: "#/components/schemas/Badge"
        profileImageUrl:
          type: string
          nullable: true
        hasBattlePass:
          type: boolean
          description: Whether the user has an active Battle Pass
        loginStreak:
          type: integer
          description: Classic daily login streak (resets to 1 after 7-day cycle)
        bpStreakDay:
          type: integer
          description: Current consecutive login days in the BP streak
        bpStreakClaimed:
          type: integer
          description: Number of BP streak prizes already claimed this cycle
        bpStreakCompleted:
          type: boolean
          description: Whether the full 7-day BP streak cycle is completed this month
      required:
        - id
        - username
        - email
        - totalPoints
        - drops
        - leaBalance
        - leaToEur
        - level
        - levelProgress
        - nextLevelPoints
        - streak
        - badgesCount
        - badges

    Badge:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        emoji:
          type: string
        category:
          type: string
        earnedAt:
          type: ["string", "null"]
          format: date-time
      required:
        - id
        - name
        - emoji
        - category

    ImpactStats:
      type: object
      properties:
        co2SavedKg:
          type: number
        plasticAvoidedKg:
          type: number
        waterSavedLiters:
          type: number
        greenProductsCount:
          type: integer
        receiptsScanned:
          type: integer
      required:
        - co2SavedKg
        - plasticAvoidedKg
        - waterSavedLiters
        - greenProductsCount
        - receiptsScanned

    ReferralInfo:
      type: object
      properties:
        code:
          type: string
        referralUrl:
          type: string
        referralCount:
          type: integer
        pointsEarned:
          type: integer
      required:
        - code
        - referralUrl
        - referralCount
        - pointsEarned

    ApplyReferralBody:
      type: object
      properties:
        code:
          type: string
      required:
        - code

    ApplyReferralResponse:
      type: object
      properties:
        success:
          type: boolean
        pointsAwarded:
          type: integer
        message:
          type: string
      required:
        - success
        - pointsAwarded
        - message

    ScanReceiptBody:
      type: object
      properties:
        imageBase64:
          type: string
          description: Base64 encoded receipt image
        storeName:
          type: ["string", "null"]
        purchaseDate:
          type: ["string", "null"]
          format: date
        rawText:
          type: ["string", "null"]
          description: Optional raw OCR text if available
      required:
        - imageBase64

    ScanResult:
      type: object
      properties:
        receiptId:
          type: integer
        barcodeExpiry:
          type: string
          format: date-time
        storeName:
          type: string
          nullable: true
        message:
          type: string
        sessionHours:
          type: integer
        pointsEarned:
          type: integer
        receiptBonusPts:
          type: integer
        welcomeBonus:
          type: boolean
        welcomeBonusPts:
          type: integer
        drops:
          type: integer
          description: Current total drops after scan
        leaBalance:
          type: number
          format: double
          description: Current $LEA balance after scan
        greenItemsFound:
          type: array
          items:
            $ref: "#/components/schemas/FoundGreenItem"
        leveledUp:
          type: boolean
        newLevel:
          type: string
          nullable: true
        badges:
          type: array
          items:
            type: object
            properties:
              name:
                type: string
              emoji:
                type: string
            required:
              - name
              - emoji
        challengesUpdated:
          type: array
          items:
            type: string
      required:
        - receiptId
        - barcodeExpiry
        - message
        - sessionHours
        - pointsEarned
        - receiptBonusPts
        - welcomeBonus
        - welcomeBonusPts
        - drops
        - leaBalance
        - greenItemsFound
        - leveledUp
        - badges
        - challengesUpdated

    BarcodeScanBody:
      type: object
      properties:
        barcode:
          type: string
        receiptId:
          type: integer
      required:
        - barcode
        - receiptId

    BarcodePreviewBody:
      type: object
      properties:
        barcode:
          type: string
      required:
        - barcode

    BarcodePreviewResult:
      type: object
      properties:
        barcode:
          type: string
        productName:
          type: string
        ecoScore:
          type: string
          nullable: true
        pointsEstimate:
          type: integer
        category:
          type: string
        emoji:
          type: string
        reasoning:
          type: string
        source:
          type: string
        found:
          type: boolean
      required:
        - barcode
        - productName
        - pointsEstimate
        - category
        - emoji
        - reasoning
        - source
        - found

    BarcodeLookupResult:
      type: object
      properties:
        barcode:
          type: string
        productName:
          type: string
        ecoScore:
          type: string
          nullable: true
        pointsToAward:
          type: integer
        category:
          type: string
        emoji:
          type: string
        reasoning:
          type: string
        source:
          type: string
        remainingDailyPoints:
          type: integer
        remainingReceiptPoints:
          type: integer
        receiptCapPts:
          type: integer
        dailyCapPts:
          type: integer
      required:
        - barcode
        - productName
        - pointsToAward
        - category
        - emoji
        - reasoning
        - source
        - remainingDailyPoints
        - remainingReceiptPoints
        - receiptCapPts
        - dailyCapPts

    BarcodeConfirmResult:
      type: object
      properties:
        scanId:
          type: integer
        productName:
          type: string
        ecoScore:
          type: string
          nullable: true
        pointsEarned:
          type: integer
        category:
          type: string
        emoji:
          type: string
        reasoning:
          type: string
        source:
          type: string
        totalPoints:
          type: integer
        drops:
          type: integer
          description: Current total drops after barcode confirm
        leaBalance:
          type: number
          format: double
          description: Current $LEA balance after barcode confirm
        level:
          type: string
        remainingDailyPoints:
          type: integer
      required:
        - scanId
        - productName
        - pointsEarned
        - category
        - emoji
        - reasoning
        - source
        - totalPoints
        - drops
        - leaBalance
        - level
        - remainingDailyPoints

    BarcodeScannedItem:
      type: object
      properties:
        id:
          type: integer
        barcode:
          type: string
        productName:
          type: string
        ecoScore:
          type: string
          nullable: true
        pointsEarned:
          type: integer
        category:
          type: string
        emoji:
          type: string
        reasoning:
          type: string
        scannedAt:
          type: string
          format: date-time
      required:
        - id
        - barcode
        - productName
        - pointsEarned
        - category
        - emoji

    ActiveSession:
      type: object
      properties:
        active:
          type: boolean
        receipt:
          type: object
          nullable: true
          properties:
            id:
              type: integer
            storeName:
              type: string
              nullable: true
            scannedAt:
              type: string
              format: date-time
            barcodeExpiry:
              type: string
              format: date-time
            pointsEarned:
              type: integer
            greenItemsCount:
              type: integer
        remainingMinutes:
          type: integer
        barcodeScans:
          type: array
          items:
            $ref: "#/components/schemas/BarcodeScannedItem"
      required:
        - active
        - barcodeScans

    FoundGreenItem:
      type: object
      properties:
        name:
          type: string
        category:
          type: string
        points:
          type: integer
        emoji:
          type: string
      required:
        - name
        - category
        - points
        - emoji

    Receipt:
      type: object
      properties:
        id:
          type: integer
        storeName:
          type: ["string", "null"]
        storeChain:
          type: ["string", "null"]
        province:
          type: ["string", "null"]
        purchaseDate:
          type: ["string", "null"]
          format: date
        pointsEarned:
          type: integer
        greenItemsCount:
          type: integer
        categories:
          type: array
          items:
            type: string
        scannedAt:
          type: string
          format: date-time
        hasImage:
          type: boolean
        imageExpiresAt:
          type: ["string", "null"]
          format: date-time
      required:
        - id
        - pointsEarned
        - greenItemsCount
        - categories
        - scannedAt
        - hasImage

    ReceiptDetail:
      type: object
      properties:
        id:
          type: integer
        storeName:
          type: ["string", "null"]
        storeChain:
          type: ["string", "null"]
        province:
          type: ["string", "null"]
        purchaseDate:
          type: ["string", "null"]
          format: date
        pointsEarned:
          type: integer
        greenItems:
          type: array
          items:
            $ref: "#/components/schemas/FoundGreenItem"
        scannedAt:
          type: string
          format: date-time
        hasImage:
          type: boolean
        imageExpiresAt:
          type: ["string", "null"]
          format: date-time
      required:
        - id
        - pointsEarned
        - greenItems
        - scannedAt
        - hasImage

    AcceptedStores:
      type: object
      properties:
        standard:
          type: array
          items:
            type: string
        bio:
          type: array
          items:
            type: string
        discount:
          type: array
          items:
            type: string
      required:
        - standard
        - bio
        - discount

    Voucher:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        description:
          type: string
        brandName:
          type: string
        brandLogo:
          type: ["string", "null"]
        category:
          type: string
        pointsCost:
          type: integer
        discount:
          type: string
          description: e.g. "10%" or "5€"
        expiresAt:
          type: ["string", "null"]
          format: date-time
        stock:
          type: ["integer", "null"]
          description: null means unlimited
        isAvailable:
          type: boolean
      required:
        - id
        - title
        - description
        - brandName
        - category
        - pointsCost
        - discount
        - isAvailable

    RedemptionResult:
      type: object
      properties:
        redemptionId:
          type: integer
        voucherId:
          type: integer
        code:
          type: string
        expiresAt:
          type: ["string", "null"]
          format: date-time
        remainingPoints:
          type: integer
        instructions:
          type: string
      required:
        - redemptionId
        - voucherId
        - code
        - remainingPoints
        - instructions

    Redemption:
      type: object
      properties:
        id:
          type: integer
        voucherId:
          type: integer
        voucherTitle:
          type: string
        brandName:
          type: string
        code:
          type: string
        pointsSpent:
          type: integer
        redeemedAt:
          type: string
          format: date-time
        expiresAt:
          type: ["string", "null"]
          format: date-time
        isUsed:
          type: boolean
      required:
        - id
        - voucherId
        - voucherTitle
        - brandName
        - code
        - pointsSpent
        - redeemedAt
        - isUsed

    Challenge:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        description:
          type: string
        category:
          type: string
        emoji:
          type: string
        targetCount:
          type: integer
        currentCount:
          type: integer
        rewardPoints:
          type: integer
        expiresAt:
          type: string
          format: date-time
        isCompleted:
          type: boolean
        progressPercent:
          type: integer
      required:
        - id
        - title
        - description
        - category
        - emoji
        - targetCount
        - currentCount
        - rewardPoints
        - expiresAt
        - isCompleted
        - progressPercent

    LeaderboardEntry:
      type: object
      properties:
        rank:
          type: integer
        userId:
          type: integer
        username:
          type: string
        level:
          type: string
        score:
          type: integer
        co2SavedKg:
          type: number
        isCurrentUser:
          type: boolean
      required:
        - rank
