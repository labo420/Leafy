openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: Leafy - Piattaforma Loyalty & Sostenibilità API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: profile
    description: User profile and stats
  - name: scan
    description: Receipt scanning and points
  - name: receipts
    description: Receipt history
  - name: vouchers
    description: Marketplace vouchers
  - name: challenges
    description: Monthly challenges
  - name: leaderboard
    description: Weekly leaderboard
  - name: products
    description: Green product catalog
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /profile:
    get:
      operationId: getProfile
      tags: [profile]
      summary: Get current user profile
      responses:
        "200":
          description: User profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Profile"

  /profile/impact:
    get:
      operationId: getImpact
      tags: [profile]
      summary: Get user environmental impact stats
      responses:
        "200":
          description: Impact stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ImpactStats"

  /profile/referral:
    get:
      operationId: getReferral
      tags: [profile]
      summary: Get user referral code and info
      responses:
        "200":
          description: Referral info
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReferralInfo"
    post:
      operationId: applyReferral
      tags: [profile]
      summary: Apply a referral code
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ApplyReferralBody"
      responses:
        "200":
          description: Referral applied
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApplyReferralResponse"
        "400":
          description: Invalid or already used code
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /scan:
    post:
      operationId: scanReceipt
      tags: [scan]
      summary: Scan a receipt and earn points
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ScanReceiptBody"
      responses:
        "200":
          description: Scan result with points earned
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ScanResult"
        "400":
          description: Duplicate receipt or validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /receipts:
    get:
      operationId: getReceipts
      tags: [receipts]
      summary: Get receipt scan history
      responses:
        "200":
          description: List of receipts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Receipt"

  /receipts/{id}:
    get:
      operationId: getReceipt
      tags: [receipts]
      summary: Get a single receipt
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Receipt detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReceiptDetail"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /vouchers:
    get:
      operationId: getVouchers
      tags: [vouchers]
      summary: Get marketplace vouchers
      parameters:
        - name: category
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: List of vouchers
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Voucher"

  /vouchers/{id}/redeem:
    post:
      operationId: redeemVoucher
      tags: [vouchers]
      summary: Redeem a voucher with points
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Redemption result with code
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RedemptionResult"
        "400":
          description: Insufficient points or already redeemed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /redemptions:
    get:
      operationId: getRedemptions
      tags: [vouchers]
      summary: Get user redemption history
      responses:
        "200":
          description: List of redemptions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Redemption"

  /challenges:
    get:
      operationId: getChallenges
      tags: [challenges]
      summary: Get active challenges with user progress
      responses:
        "200":
          description: List of challenges
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Challenge"

  /leaderboard:
    get:
      operationId: getLeaderboard
      tags: [leaderboard]
      summary: Get weekly leaderboard
      parameters:
        - name: type
          in: query
          required: false
          schema:
            type: string
            enum: [points, impact]
            default: points
      responses:
        "200":
          description: Leaderboard entries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/LeaderboardEntry"

  /products:
    get:
      operationId: getProducts
      tags: [products]
      summary: Get green product catalog
      parameters:
        - name: category
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: List of green products
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/GreenProduct"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error

    Profile:
      type: object
      properties:
        id:
          type: integer
        username:
          type: string
        email:
          type: string
        totalPoints:
          type: integer
        level:
          type: string
          enum: [Bronzo, Argento, Oro, Platino]
        levelProgress:
          type: integer
          description: Progress percentage to next level (0-100)
        nextLevelPoints:
          type: integer
        streak:
          type: integer
          description: Current daily streak in days
        badgesCount:
          type: integer
        badges:
          type: array
          items:
            $ref: "#/components/schemas/Badge"
      required:
        - id
        - username
        - email
        - totalPoints
        - level
        - levelProgress
        - nextLevelPoints
        - streak
        - badgesCount
        - badges

    Badge:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        emoji:
          type: string
        category:
          type: string
        earnedAt:
          type: ["string", "null"]
          format: date-time
      required:
        - id
        - name
        - emoji
        - category

    ImpactStats:
      type: object
      properties:
        co2SavedKg:
          type: number
        plasticAvoidedKg:
          type: number
        waterSavedLiters:
          type: number
        greenProductsCount:
          type: integer
        receiptsScanned:
          type: integer
      required:
        - co2SavedKg
        - plasticAvoidedKg
        - waterSavedLiters
        - greenProductsCount
        - receiptsScanned

    ReferralInfo:
      type: object
      properties:
        code:
          type: string
        referralUrl:
          type: string
        referralCount:
          type: integer
        pointsEarned:
          type: integer
      required:
        - code
        - referralUrl
        - referralCount
        - pointsEarned

    ApplyReferralBody:
      type: object
      properties:
        code:
          type: string
      required:
        - code

    ApplyReferralResponse:
      type: object
      properties:
        success:
          type: boolean
        pointsAwarded:
          type: integer
        message:
          type: string
      required:
        - success
        - pointsAwarded
        - message

    ScanReceiptBody:
      type: object
      properties:
        imageBase64:
          type: string
          description: Base64 encoded receipt image
        storeName:
          type: ["string", "null"]
        purchaseDate:
          type: ["string", "null"]
          format: date
        rawText:
          type: ["string", "null"]
          description: Optional raw OCR text if available
      required:
        - imageBase64

    ScanResult:
      type: object
      properties:
        receiptId:
          type: integer
        pointsEarned:
          type: integer
        totalPoints:
          type: integer
        greenItemsFound:
          type: array
          items:
            $ref: "#/components/schemas/FoundGreenItem"
        badges:
          type: array
          items:
            $ref: "#/components/schemas/Badge"
          description: New badges earned with this scan
        challengesUpdated:
          type: array
          items:
            type: string
          description: Challenge names that were progressed
        message:
          type: string
      required:
        - receiptId
        - pointsEarned
        - totalPoints
        - greenItemsFound
        - badges
        - challengesUpdated
        - message

    FoundGreenItem:
      type: object
      properties:
        name:
          type: string
        category:
          type: string
        points:
          type: integer
        emoji:
          type: string
      required:
        - name
        - category
        - points
        - emoji

    Receipt:
      type: object
      properties:
        id:
          type: integer
        storeName:
          type: ["string", "null"]
        purchaseDate:
          type: ["string", "null"]
          format: date
        pointsEarned:
          type: integer
        greenItemsCount:
          type: integer
        categories:
          type: array
          items:
            type: string
        scannedAt:
          type: string
          format: date-time
      required:
        - id
        - pointsEarned
        - greenItemsCount
        - categories
        - scannedAt

    ReceiptDetail:
      type: object
      properties:
        id:
          type: integer
        storeName:
          type: ["string", "null"]
        purchaseDate:
          type: ["string", "null"]
          format: date
        pointsEarned:
          type: integer
        greenItems:
          type: array
          items:
            $ref: "#/components/schemas/FoundGreenItem"
        scannedAt:
          type: string
          format: date-time
      required:
        - id
        - pointsEarned
        - greenItems
        - scannedAt

    Voucher:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        description:
          type: string
        brandName:
          type: string
        brandLogo:
          type: ["string", "null"]
        category:
          type: string
        pointsCost:
          type: integer
        discount:
          type: string
          description: e.g. "10%" or "5€"
        expiresAt:
          type: ["string", "null"]
          format: date-time
        stock:
          type: ["integer", "null"]
          description: null means unlimited
        isAvailable:
          type: boolean
      required:
        - id
        - title
        - description
        - brandName
        - category
        - pointsCost
        - discount
        - isAvailable

    RedemptionResult:
      type: object
      properties:
        redemptionId:
          type: integer
        voucherId:
          type: integer
        code:
          type: string
        expiresAt:
          type: ["string", "null"]
          format: date-time
        remainingPoints:
          type: integer
        instructions:
          type: string
      required:
        - redemptionId
        - voucherId
        - code
        - remainingPoints
        - instructions

    Redemption:
      type: object
      properties:
        id:
          type: integer
        voucherId:
          type: integer
        voucherTitle:
          type: string
        brandName:
          type: string
        code:
          type: string
        pointsSpent:
          type: integer
        redeemedAt:
          type: string
          format: date-time
        expiresAt:
          type: ["string", "null"]
          format: date-time
        isUsed:
          type: boolean
      required:
        - id
        - voucherId
        - voucherTitle
        - brandName
        - code
        - pointsSpent
        - redeemedAt
        - isUsed

    Challenge:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        description:
          type: string
        category:
          type: string
        emoji:
          type: string
        targetCount:
          type: integer
        currentCount:
          type: integer
        rewardPoints:
          type: integer
        expiresAt:
          type: string
          format: date-time
        isCompleted:
          type: boolean
        progressPercent:
          type: integer
      required:
        - id
        - title
        - description
        - category
        - emoji
        - targetCount
        - currentCount
        - rewardPoints
        - expiresAt
        - isCompleted
        - progressPercent

    LeaderboardEntry:
      type: object
      properties:
        rank:
          type: integer
        userId:
          type: integer
        username:
          type: string
        level:
          type: string
        score:
          type: integer
        co2SavedKg:
          type: number
        isCurrentUser:
          type: boolean
      required:
        - rank
        - userId
        - username
        - level
        - score
        - co2SavedKg
        - isCurrentUser

    GreenProduct:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        brand:
          type: string
        category:
          type: string
        certifications:
          type: array
          items:
            type: string
        sustainabilityScore:
          type: integer
          description: Score from 1 to 10
        pointsValue:
          type: integer
        emoji:
          type: string
        description:
          type: string
      required:
        - id
        - name
        - brand
        - category
        - certifications
        - sustainabilityScore
        - pointsValue
        - emoji
        - description
