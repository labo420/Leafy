<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <filter id="whiteFilter">
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer>
        <feFuncR type="linear" slope="1" intercept="0.5"/>
        <feFuncG type="linear" slope="1" intercept="0.5"/>
        <feFuncB type="linear" slope="1" intercept="0.5"/>
      </feComponentTransfer>
    </filter>
  </defs>
  <rect x="0" y="0" width="512" height="512" rx="112" ry="112" fill="#2D6A4F"/>
  <image href="leaf-mark.png" x="130" y="130" width="252" height="252" preserveAspectRatio="xMidYMid meet" filter="url(#whiteFilter)" opacity="0.95"/>
</svg>
