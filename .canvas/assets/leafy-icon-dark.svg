<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Dark green leaf icon (forest green #1b5e20) -->
  <defs>
    <linearGradient id="leafGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2d7a3a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0d3817;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Leaf shape with smooth curves -->
  <path d="M 100 20 Q 140 60 135 100 Q 130 140 100 170 Q 70 140 65 100 Q 60 60 100 20 Z" 
        fill="url(#leafGradient)" 
        stroke="#1b5e20" 
        stroke-width="1.5"/>
  
  <!-- Leaf vein detail -->
  <path d="M 100 20 Q 105 80 100 170" 
        stroke="#ffffff" 
        stroke-width="2" 
        opacity="0.3" 
        fill="none" 
        stroke-linecap="round"/>
</svg>
